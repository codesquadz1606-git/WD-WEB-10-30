<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <fieldset>
        <legend>Registration Form</legend>
        <label for="fname">First Name : </label>
        <input type="text" name="" id="fname">
        <br>
        <label for="">Last Name :</label>
        <input type="text">
        <br>
        <label for="">Email : </label>
        <input type="email">
        <br>
        <label for="">Password :</label>
        <input type="password">
        <br>
        <label for="">Date Of Birth :</label>
        <input type="date">
        <br>
        <label for="">Gender :</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <br>
        <label for="">Select any One : </label>
        <select name="" id="">
            <option value="">--Select any--</option>
            <option value="">10th Pass</option>
            <option value="">12th Pass</option>
            <option value="">Graduate</option>
            <option value="">Post Graduate</option>
        </select>
        <br>
        <label for="">Phone No :</label>
        <input type="number">
        <br>
        <label for="">Hobbies : </label>
        <input type="checkbox" name="" id="">Reading
        <input type="checkbox" name="" id="">Writing
        <br>
        <label for="">Feedback :</label>
        <textarea name="" id=""></textarea>
        <br>
        <input type="file" name="" id="">
        <br>
        <input type="range">
        <br>
        <input type="color">

        <br>
        <input type="submit" value="Save">
        <input type="reset" value="Delete">
        </fieldset>
    </form>

    <hr>

    <form action="">
        <table>
            <tr>
                <td width="200px">FIrst Name </td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Last Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Nick Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender">Male
                    <input type="radio" name="gender">Female
                    <input type="radio" name="gender">Others
                </td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td><input type="number"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td>
                    <textarea name="" id=""></textarea>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit">
                    <input type="reset">
                </td>
            </tr>
        </table>
    </form>


    <hr>

    <marquee behavior="alternate" direction="right">
        Hello Everyone
    </marquee>
    <marquee behavior="" direction="" onmouseenter="this.stop()" onmouseleave="this.start()">
        hello
    </marquee>
</body>
</html>
