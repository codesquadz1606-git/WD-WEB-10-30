<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* media query */

    .box-1{
        background-color: yellow;
        text-align: center;
        padding: 20px;
        display: none;
    }

    .box-2{
        background-color: red;
        text-align: center;
        padding: 20px;
        display: none;
    }

    .box-3{
        background-color: green;
        text-align: center;
        padding: 20px;
        display: none;
    }

    .box-4{
        background-color: blue;
        text-align: center;
        padding: 20px;
        display: none;
    }

    @media (min-width :1600px) {
        .box-1{
            display: block;
        }
    }

    @media (min-width:1350px) and (max-width:1599px){
        .box-2{
            display: block;
        }
    }

    @media (min-width:1100px) and (max-width:1349px) {
        .box-3{
            display: block;
        }
    }

    @media (min-width:700px) and (max-width:1099px){
        .box-4{
            display: block;
        }
    }

    @media (max-width:699px) {
        .box-1,.box-2,.box-3,.box-4{
            display: block;
        }
    }


    .first-screen{
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .first-screen .navigation ul{
        display: flex;
        gap: 20px;
    }

    .first-screen .navigation ul li{
        list-style: none;
    }

    .second-screen{
        display: none;
    }

    .content{
        display: flex;justify-content: space-between;
        align-items: center;

    }

    @media (max-width:1020px) {
        .first-screen{
            display: none;
        }

        .second-screen{
            display: block;
        }
    }

    .container{
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        margin-top: 50px;
    }

    .con{
        width: 300px;
        height: 350px;
        background-color: grey;
    }

    .first{
        width: 100%;
        height: 150px;
        background-color: red;
        background-image: url(./assets/1.jpg);
        background-size: cover;
        transition: all 3s ease-in-out;
    }

    .first:hover{
        background-image: url(./assets/2.jpg);
        background-size: cover;
    }

    .second{
        width: 100%;
        height: 200px;
        background-color: green;
    }
</style>
<body>
    <!-- Responsive Website -->
    
    <!-- <div class="box-1">
        This is Box 1
    </div>
    <div class="box-2">
        This is Box 2
    </div>
    <div class="box-3">
        This is Box 3
    </div>
    <div class="box-4">
        This is Box 4
    </div> -->

    <!-- Page-breakpoints 
        1920px or above
        1440px 1920px
        1260 or 1440px
        1080 px 1260px
        850px 1080px
        550px 850px 
    -->

    <div class="navbar">
        <div class="first-screen">
            <div class="logo">
                <h1>Loop Earplugs</h1>
            </div>
            <div class="navigation">
                <ul>
                    <li>Shop</li>
                    <li>Shop</li>
                    <li>Shop</li>
                    <li>Shop</li>
                    <li>Shop</li>
                </ul>
            </div>
            <div class="buttons">
                <button>COuntry</button>
                <button>Account</button>
                <button>Cart</button>
            </div>
        </div>
        <div class="second-screen">
            <div class="content">
                <div class="ham">
                    <h1>Ham</h1>
                </div>
                <div class="second-logo">
                    <h1>Loop earplugs</h1>
                </div>
                <div class="buttons">
                <button>COuntry</button>
                <button>Account</button>
                <button>Cart</button>
            </div>
            </div>

        </div>
    </div>

    <div class="container">
        <div class="con" id="con-1">
            <div class="first"></div>
            <div class="second"></div>
        </div>
        <div class="con" id="con-2"></div>
        <div class="con" id="con-3"></div>
        <div class="con" id="con-4"></div>
        <div class="con" id="con-5"></div>
        <div class="con" id="con-6"></div>
    </div>
</body>
</html>
